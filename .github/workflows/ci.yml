name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ditto_site
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ditto_site
      CATALOG_ONLY_HINTS: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Assert pinned pattern catalog
        run: node --import tsx compiler/src/knowledge/patternIndex.ts

      - name: Validate pattern catalog
        run: node compiler/scripts/validate-pattern-catalog.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: DB migrate
        run: npm run db:migrate

      - name: Test
        run: npm test
